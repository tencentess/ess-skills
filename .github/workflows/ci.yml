name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Tidy & verify modules
        working-directory: toolkit
        run: |
          cd foundation && go mod tidy && git diff --exit-code go.mod go.sum
          cd ../contract-atoms && go mod tidy && git diff --exit-code go.mod go.sum
          cd ../contract-review && go mod tidy && git diff --exit-code go.mod go.sum
          cd ../contract-comparison && go mod tidy && git diff --exit-code go.mod go.sum

      - name: Vet
        working-directory: toolkit
        run: |
          cd foundation && go vet ./...
          cd ../contract-atoms && go vet ./...
          cd ../contract-review && go vet ./...
          cd ../contract-comparison && go vet ./...

      - name: Test
        working-directory: toolkit
        run: cd foundation && go test ./... -v

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build all platforms & package
        run: make dist VERSION=${{ steps.version.outputs.version }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums-sha256.txt
          generate_release_notes: true
